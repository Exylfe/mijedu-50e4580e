name: Build Android APK

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Force Node 24 for all steps

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify Node version
        run: node -v  # Make sure Node 24 is active

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install NPM dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor Android
        run: npm install @capacitor/android

      - name: Add and sync Capacitor Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mijedu-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
