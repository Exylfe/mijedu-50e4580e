name: Build Android APK

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_HOME_17: /usr/lib/jvm/zulu-17-amd64
  JAVA_HOME: /usr/lib/jvm/zulu-17-amd64

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3. Setup Java JDK 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 4. Install dependencies
      - name: Install npm dependencies
        run: npm install

      # 5. Build web app
      - name: Build web app
        run: npm run build

      # 6. Install Capacitor Android
      - name: Install Capacitor Android
        run: npm install @capacitor/android

      # 7. Add and sync Capacitor platform
      - name: Sync Capacitor
        run: |
          npx cap add android || true
          npx cap sync android

      # 8. Ensure Gradle uses JDK 17
      - name: Ensure Gradle uses JDK 17
        run: |
          echo "org.gradle.java.home=/usr/lib/jvm/zulu-17-amd64" >> android/gradle.properties

      # 9. Build APK
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 10. Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mijedu-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
